<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 🌐 Language Selector -->
  <div class="top-bar">
    <select id="languageSelect">
      <option value="en">English</option>
      <option value="hi">हिंदी</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>

  <h1 class="title" id="title">🚀 Smart Reporting</h1>

  <div class="scroll-container">

    <div class="card">
      <img src="https://media.istockphoto.com/id/1326419335/photo/portrait-of-police-officer-during-parade.jpg?s=612x612&w=0&k=20&c=TUvT90Bj8n4rRkOcWrdpITdKwvj-lQxe57oZu9QPgyw=">
      <div class="card-content">
        <h3 id="police">Police</h3>
        <button onclick="window.location.href='complaint.html'">
  File Complaint
</button>
      </div>
    </div>

    <div class="card">
      <img src="https://www.hindustantimes.com/ht-img/img/2023/07/02/1600x900/Waterlogged-roads-after-rains-in-Ludhiana-on-Sunda_1688320771050.jpg">
      <div class="card-content">
        <h3 id="roads">Roads & Drainage</h3>
        
        <button onclick="window.location.href='complaint.html'">
  File Complaint
</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1581092918056-0c4c3acd3789">
      <div class="card-content">
        <h3 id="electricity">Electricity</h3>
        <button onclick="window.location.href='complaint.html'">
  File Complaint
</button>
      </div>
    </div>
<div class="card">
      <img src="https://cdn.pixabay.com/photo/2023/08/17/11/01/indian-school-children-8196294_960_720.jpg">
      <div class="card-content">
        <h3 id="Education">Education</h3>
        <button onclick="window.location.href='complaint.html'">
  File Complaint
</button>
      </div>
    </div>








    <div class="card">
      <img src="https://images.unsplash.com/photo-1506765515384-028b60a970df">
      <div class="card-content">
        <h3 id="water">Water Supply</h3>
        <button onclick="window.location.href='complaint.html'">
  File Complaint
</button>
      </div>
    </div>

  </div>

  <!-- Logout -->
  <div class="logout-box">
    <a href="login.html"><button class="logout-btn">Logout</button></a>
  </div>

<script src="script.js"></script>

</body>
</html>
